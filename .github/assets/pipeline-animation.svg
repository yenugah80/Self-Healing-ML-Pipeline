<svg width="1280" height="360" viewBox="0 0 1280 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Animated self-healing machine learning pipeline</title>
  <desc id="desc">A dark animated pipeline showing data batches moving through monitoring, agent decision, retraining, and deployment.</desc>
  <style>
    :root {
      --bg1: #07111f;
      --bg2: #0e2538;
      --ink: #eef7ff;
      --muted: #9fb4c8;
      --blue: #49a6ff;
      --cyan: #35e5d4;
      --green: #4ade80;
      --amber: #fbbf24;
      --pink: #ff6aa2;
      --line: #b4dcff;
    }

    .title { font: 800 44px Inter, Segoe UI, Arial, sans-serif; fill: var(--ink); letter-spacing: 0; }
    .subtitle { font: 500 18px Inter, Segoe UI, Arial, sans-serif; fill: var(--muted); letter-spacing: 0; }
    .card-title { font: 800 18px Inter, Segoe UI, Arial, sans-serif; fill: var(--ink); letter-spacing: 0; }
    .card-sub { font: 500 13px Inter, Segoe UI, Arial, sans-serif; fill: var(--muted); letter-spacing: 0; }
    .metric { font: 800 22px Inter, Segoe UI, Arial, sans-serif; fill: var(--cyan); letter-spacing: 0; }
    .chip { font: 700 12px Inter, Segoe UI, Arial, sans-serif; fill: #05111f; letter-spacing: 0; }

    .card {
      fill: #ffffff;
      fill-opacity: 0.06;
      stroke: #b4dcff;
      stroke-opacity: 0.22;
      stroke-width: 1.2;
    }

    .pulse {
      animation: pulse 2.4s ease-in-out infinite;
      transform-origin: center;
    }

    .flow-dot {
      offset-path: path("M185 235 C310 235, 310 235, 435 235 S685 235, 810 235 S1060 235, 1095 235");
      animation: travel 5.6s linear infinite;
    }

    .flow-dot.two { animation-delay: -1.4s; }
    .flow-dot.three { animation-delay: -2.8s; }
    .flow-dot.four { animation-delay: -4.2s; }

    .scan {
      animation: scan 4s ease-in-out infinite;
      transform-origin: center;
    }

    .heal {
      animation: heal 3s ease-in-out infinite;
      transform-origin: center;
    }

    .spark {
      animation: spark 2.8s ease-in-out infinite;
      transform-origin: center;
    }

    @keyframes travel {
      from { offset-distance: 0%; opacity: 0; }
      8% { opacity: 1; }
      88% { opacity: 1; }
      to { offset-distance: 100%; opacity: 0; }
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.78; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.035); }
    }

    @keyframes scan {
      0%, 100% { transform: translateX(-34px); opacity: 0.35; }
      50% { transform: translateX(34px); opacity: 1; }
    }

    @keyframes heal {
      0%, 100% { stroke-dashoffset: 120; opacity: 0.55; }
      50% { stroke-dashoffset: 0; opacity: 1; }
    }

    @keyframes spark {
      0%, 100% { opacity: 0.2; transform: scale(0.8); }
      50% { opacity: 1; transform: scale(1.15); }
    }

    @media (prefers-reduced-motion: reduce) {
      .pulse, .flow-dot, .scan, .heal, .spark { animation: none; }
    }
  </style>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="360" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07111f"/>
      <stop offset="0.48" stop-color="#0a2034"/>
      <stop offset="1" stop-color="#102c42"/>
    </linearGradient>
    <linearGradient id="accent" x1="130" y1="0" x2="1150" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#49a6ff"/>
      <stop offset="0.5" stop-color="#35e5d4"/>
      <stop offset="1" stop-color="#4ade80"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.2 0 0 0 0 0.85 0 0 0 0 0.95 0 0 0 0.55 0"/>
      <feBlend in="SourceGraphic" mode="screen"/>
    </filter>
  </defs>

  <rect width="1280" height="360" rx="28" fill="url(#bg)"/>
  <path d="M0 282 C180 220, 260 326, 430 268 C595 212, 725 298, 890 236 C1048 176, 1158 220, 1280 182 L1280 360 L0 360 Z" fill="#35e5d4" opacity="0.06"/>
  <path d="M0 96 C180 136, 272 56, 430 104 C604 158, 744 70, 910 112 C1066 152, 1174 104, 1280 72" stroke="#49a6ff" stroke-opacity="0.18" stroke-width="2"/>

  <text x="64" y="74" class="title">Self-Healing ML Pipeline</text>
  <text x="66" y="108" class="subtitle">Monitor drift. Decide action. Retrain autonomously. Recover performance.</text>

  <rect x="66" y="132" width="155" height="30" rx="15" fill="#35e5d4"/>
  <text x="86" y="152" class="chip">Agentic AI loop</text>
  <rect x="236" y="132" width="132" height="30" rx="15" fill="#fbbf24"/>
  <text x="257" y="152" class="chip">Fraud detection</text>
  <rect x="383" y="132" width="116" height="30" rx="15" fill="#4ade80"/>
  <text x="404" y="152" class="chip">100% healing</text>

  <path d="M185 235 C310 235, 310 235, 435 235 S685 235, 810 235 S1060 235, 1095 235" stroke="url(#accent)" stroke-width="3" stroke-linecap="round" opacity="0.76"/>

  <g transform="translate(70 184)">
    <rect class="card pulse" width="190" height="102" rx="18"/>
    <text x="22" y="35" class="card-title">Streaming</text>
    <text x="22" y="60" class="card-sub">18 batches</text>
    <text x="22" y="84" class="metric">5,000 tx</text>
  </g>

  <g transform="translate(320 184)">
    <rect class="card" width="190" height="102" rx="18"/>
    <text x="22" y="35" class="card-title">Monitoring</text>
    <text x="22" y="60" class="card-sub">F1, Recall, ROC-AUC</text>
    <rect class="scan" x="30" y="75" width="76" height="4" rx="2" fill="#35e5d4"/>
    <rect x="22" y="75" width="136" height="4" rx="2" fill="#ffffff" opacity="0.18"/>
  </g>

  <g transform="translate(570 184)">
    <rect class="card" width="190" height="102" rx="18"/>
    <text x="22" y="35" class="card-title">Agent Decision</text>
    <text x="22" y="60" class="card-sub">Continue, warn, tune</text>
    <text x="22" y="84" class="metric">Retrain</text>
  </g>

  <g transform="translate(820 184)">
    <rect class="card" width="190" height="102" rx="18"/>
    <text x="22" y="35" class="card-title">Retraining</text>
    <text x="22" y="60" class="card-sub">LR, RF, XGBoost</text>
    <path class="heal" d="M24 82 C55 58, 91 104, 154 70" stroke="#4ade80" stroke-width="5" stroke-linecap="round" stroke-dasharray="120"/>
  </g>

  <g transform="translate(1070 184)">
    <rect class="card pulse" width="150" height="102" rx="18"/>
    <text x="22" y="35" class="card-title">Deploy</text>
    <text x="22" y="60" class="card-sub">feedback loop</text>
    <circle class="spark" cx="39" cy="82" r="8" fill="#4ade80" filter="url(#glow)"/>
    <circle class="spark" cx="70" cy="82" r="5" fill="#35e5d4" filter="url(#glow)" style="animation-delay:-.7s"/>
    <circle class="spark" cx="96" cy="82" r="6" fill="#49a6ff" filter="url(#glow)" style="animation-delay:-1.4s"/>
  </g>

  <circle class="flow-dot" r="7" fill="#35e5d4" filter="url(#glow)"/>
  <circle class="flow-dot two" r="7" fill="#49a6ff" filter="url(#glow)"/>
  <circle class="flow-dot three" r="7" fill="#4ade80" filter="url(#glow)"/>
  <circle class="flow-dot four" r="7" fill="#ff6aa2" filter="url(#glow)"/>

  <text x="64" y="326" class="subtitle">Best F1: 0.8157 baseline | Average F1 gain after healing: +0.0454 | Retraining events: 3 | Success rate: 100%</text>
</svg>
